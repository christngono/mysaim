<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page-title">Formation IA - SAIM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #0284C7;
      --blue-dark: #075985;
      --blue-light:#E0F2FE;
      --accent:    #F59E0B;
      --green:     #10B981;
      --text:      #1E293B;
      --muted:     #64748B;
      --bg:        #F8FAFC;
      --white:     #FFFFFF;
      --radius:    12px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

    /* ===== LANGUAGE SELECTOR ===== */
    #lang-select {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #075985 0%, #0284C7 60%, #0EA5E9 100%);
      text-align: center; padding: 2rem;
    }
    #lang-select img { width: 160px; margin-bottom: 2.5rem; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.35)); animation: floatIn 0.8s ease both; }
    #lang-select h2 { color: var(--white); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; animation: floatIn 0.8s 0.15s ease both; }
    #lang-select p  { color: rgba(255,255,255,0.75); font-size: 1rem; margin-bottom: 2.5rem; animation: floatIn 0.8s 0.25s ease both; }
    .lang-buttons { display: flex; gap: 1.25rem; flex-wrap: wrap; justify-content: center; animation: floatIn 0.8s 0.35s ease both; }
    .lang-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.3);
      color: var(--white); border-radius: 16px; padding: 1.5rem 2.5rem;
      cursor: pointer; font-size: 1rem; font-weight: 700; transition: all 0.2s; backdrop-filter: blur(8px);
    }
    .lang-btn:hover { background: rgba(255,255,255,0.25); border-color: var(--white); transform: translateY(-4px) scale(1.04); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
    .lang-btn .flag { font-size: 3rem; line-height: 1; }
    .lang-btn .lang-name { font-size: 1.1rem; }
    .lang-btn .lang-sub { font-size: 0.78rem; opacity: 0.75; font-weight: 400; }
    #lang-select.hidden { opacity: 0; transform: scale(1.04); pointer-events: none; transition: opacity 0.6s ease, transform 0.6s ease; }

    /* ===== LANDING ===== */
    #landing {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; background: url('images/image_qui_apprend.jpg') center/cover no-repeat;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #landing::before { content:''; position:absolute; inset:0; background: linear-gradient(135deg, rgba(2,132,199,0.87) 0%, rgba(7,89,133,0.93) 100%); }
    #landing .landing-content { position:relative; z-index:1; padding:2rem; max-width:700px; }
    #landing .landing-logo { width:160px; margin-bottom:2rem; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4)); animation:floatIn 1s ease both; }
    #landing h1 { font-size:clamp(1.6rem,4vw,2.6rem); font-weight:800; color:var(--white); line-height:1.25; margin-bottom:1rem; animation:floatIn 1s 0.2s ease both; }
    #landing > .landing-content > p { font-size:1.1rem; color:rgba(255,255,255,0.85); margin-bottom:2.5rem; animation:floatIn 1s 0.4s ease both; }
    #btn-start {
      display:inline-flex; align-items:center; gap:0.6rem; background:var(--accent);
      color:#1a1a1a; font-size:1.1rem; font-weight:700; padding:1rem 2.5rem;
      border:none; border-radius:50px; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
      box-shadow:0 8px 32px rgba(245,158,11,0.4); animation:floatIn 1s 0.6s ease both;
    }
    #btn-start:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 12px 40px rgba(245,158,11,0.55); }
    #btn-start svg { width:22px; height:22px; }
    #landing.hidden { opacity:0; transform:scale(1.05); pointer-events:none; }

    /* ===== COURSE ===== */
    #course { display:none; opacity:0; transition:opacity 0.6s ease; }
    #course.visible { display:block; opacity:1; }

    /* ===== NAVBAR ===== */
    nav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:1rem; padding:0.8rem 2rem; background:var(--white); box-shadow:0 2px 16px rgba(0,0,0,0.08); }
    nav img { height:44px; }
    nav .nav-title { font-size:0.95rem; font-weight:600; color:var(--blue-dark); flex:1; }
    nav .nav-badge { background:var(--blue-light); color:var(--blue-dark); font-size:0.75rem; font-weight:700; padding:0.25rem 0.75rem; border-radius:50px; white-space:nowrap; }
    .lang-toggle { display:flex; gap:0.3rem; }
    .lang-toggle button {
      background:none; border:1.5px solid #E2E8F0; border-radius:6px;
      padding:0.2rem 0.55rem; font-size:0.75rem; font-weight:700; cursor:pointer;
      color:var(--muted); transition:all 0.15s;
    }
    .lang-toggle button.active { background:var(--blue); border-color:var(--blue); color:var(--white); }
    .lang-toggle button:hover:not(.active) { border-color:var(--blue); color:var(--blue); }

    /* ===== LAYOUT ===== */
    .container { max-width:900px; margin:0 auto; padding:0 1.5rem; }
    section { padding:3.5rem 0; }
    section + section { border-top:1px solid #E2E8F0; }

    .section-label { display:inline-block; background:var(--blue-light); color:var(--blue-dark); font-size:0.75rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.9rem; border-radius:50px; margin-bottom:0.75rem; }
    h2 { font-size:clamp(1.4rem,3vw,2rem); font-weight:800; color:var(--blue-dark); margin-bottom:1rem; }
    h3 { font-size:1.2rem; font-weight:700; color:var(--blue); margin:2rem 0 0.75rem; display:flex; align-items:center; gap:0.5rem; }
    h3::before { content:''; display:inline-block; width:4px; height:1.2em; background:var(--blue); border-radius:2px; }
    h4 { font-size:1rem; font-weight:700; color:var(--text); margin:1.5rem 0 0.5rem; }
    p  { margin-bottom:0.9rem; color:#334155; }

    /* ===== SAIM INTRO ===== */
    .saim-intro { background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%); color:var(--white); border-radius:var(--radius); padding:2.5rem 2rem; display:flex; align-items:center; gap:2rem; flex-wrap:wrap; }
    .saim-intro .saim-icon { font-size:3.5rem; flex-shrink:0; }
    .saim-intro p { color:rgba(255,255,255,0.9); margin-bottom:0; }
    .saim-intro h2 { color:var(--white); margin-bottom:0.5rem; }

    /* ===== OBJECTIVES ===== */
    .objectives-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem; margin-top:1.5rem; }
    .obj-card { background:var(--white); border:1.5px solid #E2E8F0; border-radius:var(--radius); padding:1.25rem 1.5rem; display:flex; align-items:flex-start; gap:1rem; transition:box-shadow 0.2s,border-color 0.2s,transform 0.2s; opacity:0; transform:translateY(20px); }
    .obj-card.visible { animation:fadeUp 0.5s ease forwards; }
    .obj-card:hover { box-shadow:0 8px 24px rgba(2,132,199,0.12); border-color:var(--blue); transform:translateY(-2px); }
    .obj-icon { width:44px; height:44px; border-radius:10px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .obj-card p { margin:0; font-size:0.95rem; color:var(--text); font-weight:500; }

    /* ===== IMAGE ===== */
    .illus-image { width:100%; max-height:420px; object-fit:cover; border-radius:var(--radius); box-shadow:0 8px 40px rgba(0,0,0,0.14); }

    /* ===== MODULES ===== */
    .modules-list { display:flex; flex-direction:column; gap:0.75rem; margin-top:1.5rem; }
    .module-badge { display:flex; align-items:center; gap:1rem; background:var(--white); border:1.5px solid #E2E8F0; border-radius:var(--radius); padding:1rem 1.5rem; font-weight:600; transition:border-color 0.2s,box-shadow 0.2s; }
    .module-badge:hover { border-color:var(--blue); box-shadow:0 4px 16px rgba(2,132,199,0.1); }
    .module-num { width:36px; height:36px; border-radius:50%; background:var(--blue); color:var(--white); display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:800; flex-shrink:0; }
    .module-badge.active .module-num { background:var(--accent); color:#1a1a1a; }
    .module-badge.active { border-color:var(--accent); background:#FFFBEB; }

    /* ===== HIGHLIGHTS ===== */
    .highlight { background:linear-gradient(120deg,#FEF3C7 0%,#FDE68A 100%); color:#92400E; border-radius:4px; padding:0 4px; font-weight:700; }
    .highlight-blue { background:linear-gradient(120deg,var(--blue-light) 0%,#BAE6FD 100%); color:var(--blue-dark); border-radius:4px; padding:0 4px; font-weight:700; }

    /* ===== BOXES ===== */
    .info-box { background:var(--blue-light); border-left:4px solid var(--blue); border-radius:0 var(--radius) var(--radius) 0; padding:1.25rem 1.5rem; margin:1.5rem 0; }
    .info-box p { margin:0; color:var(--blue-dark); }
    .retenir-box { background:#ECFDF5; border-left:4px solid var(--green); border-radius:0 var(--radius) var(--radius) 0; padding:1.25rem 1.5rem; margin:1.5rem 0; }
    .retenir-box .retenir-title { font-size:0.8rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--green); margin-bottom:0.5rem; }
    .retenir-box p { margin:0; color:#065F46; }

    /* ===== EXAMPLE CARDS ===== */
    .example-card { background:var(--white); border:1.5px solid #E2E8F0; border-radius:var(--radius); overflow:hidden; margin:1.5rem 0; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
    .example-card-header { background:linear-gradient(90deg,var(--blue-dark),var(--blue)); color:var(--white); padding:1rem 1.5rem; display:flex; align-items:center; gap:0.75rem; font-weight:700; }
    .example-card-header .ex-icon { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
    .example-card-body { padding:1.5rem; }
    .example-card img { width:100%; border-radius:8px; border:1px solid #E2E8F0; margin-top:1rem; box-shadow:0 4px 16px rgba(0,0,0,0.08); }
    .alice-intro { display:flex; align-items:center; gap:1.25rem; background:#F8FAFC; border-radius:10px; padding:1rem 1.25rem; margin-bottom:1rem; }
    .alice-intro img { width:70px; height:70px; border-radius:50%; object-fit:cover; object-position:top; border:3px solid var(--blue-light); flex-shrink:0; }
    .alice-intro p { margin:0; font-size:0.95rem; }

    /* ===== SERVERS ===== */
    .server-block { display:grid; grid-template-columns:1fr 1fr; gap:2rem; align-items:center; margin:1.5rem 0; }
    .server-block img { width:100%; border-radius:var(--radius); box-shadow:0 8px 32px rgba(0,0,0,0.14); }
    .server-text p { margin-bottom:0.75rem; }

    /* ===== TOOLS ===== */
    .tools-grid { display:flex; flex-wrap:wrap; gap:0.75rem; margin:1rem 0; }
    .tool-chip { display:flex; align-items:center; gap:0.5rem; background:var(--white); border:1.5px solid #E2E8F0; border-radius:50px; padding:0.4rem 1rem 0.4rem 0.6rem; font-weight:700; font-size:0.9rem; color:var(--blue-dark); box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .tool-chip .dot { width:10px; height:10px; border-radius:50%; background:var(--blue); }

    /* ===== FINISH ===== */
    .finish-section { text-align:center; padding:4rem 1.5rem; background:linear-gradient(180deg,transparent,var(--blue-light)); }
    .finish-section p { color:var(--muted); margin-bottom:1.5rem; font-size:1rem; }
    #btn-finish { display:inline-flex; align-items:center; gap:0.75rem; background:linear-gradient(135deg,var(--green),#059669); color:var(--white); font-size:1.15rem; font-weight:800; padding:1.1rem 2.8rem; border:none; border-radius:50px; cursor:pointer; box-shadow:0 8px 32px rgba(16,185,129,0.35); transition:transform 0.2s,box-shadow 0.2s; }
    #btn-finish:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 12px 40px rgba(16,185,129,0.5); }
    #btn-finish svg { width:22px; height:22px; }

    /* ===== POPUP ===== */
    #popup-overlay { display:none; position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    #popup-overlay.active { display:flex; }
    #popup { background:var(--white); border-radius:20px; padding:3rem 2.5rem; max-width:480px; width:90%; text-align:center; box-shadow:0 32px 80px rgba(0,0,0,0.2); animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; position:relative; overflow:hidden; }
    .popup-confetti { position:absolute; top:0; left:0; right:0; height:8px; background:linear-gradient(90deg,#F59E0B,#10B981,#0284C7,#F59E0B,#EF4444,#10B981); background-size:200%; animation:rainbowSlide 2s linear infinite; }
    .popup-trophy { font-size:5rem; margin-bottom:1rem; animation:bounce 1s ease infinite alternate; }
    #popup h2 { font-size:1.8rem; color:var(--blue-dark); margin-bottom:0.75rem; }
    #popup p  { color:var(--muted); margin-bottom:2rem; font-size:1rem; }
    #btn-close-popup { background:linear-gradient(135deg,var(--blue),var(--blue-dark)); color:var(--white); border:none; border-radius:50px; padding:0.9rem 2.5rem; font-size:1rem; font-weight:700; cursor:pointer; transition:transform 0.2s; }
    #btn-close-popup:hover { transform:scale(1.05); }
    .confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .confetti-piece { position:absolute; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; }

    /* ===== ANIMATIONS ===== */
    @keyframes floatIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn   { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }
    @keyframes bounce  { from{transform:translateY(0)} to{transform:translateY(-10px)} }
    @keyframes rainbowSlide { from{background-position:0%} to{background-position:200%} }
    @keyframes confettiFall { 0%{opacity:1;top:-10%} 100%{opacity:0.3;top:110%} }

    @media(max-width:640px){
      .server-block{grid-template-columns:1fr}
      nav .nav-title{font-size:0.8rem}
      .saim-intro{flex-direction:column;text-align:center}
    }
  </style>
</head>
<body>

<!-- ===== LANGUAGE SELECTOR ===== -->
<div id="lang-select">
  <img src="images/saimlogo.png" alt="Logo SAIM" />
  <h2 id="ls-title">Choisissez votre langue</h2>
  <p id="ls-sub">Choose your language</p>
  <div class="lang-buttons">
    <button class="lang-btn" onclick="chooseLang('fr')">
      <span class="flag">🇫🇷</span>
      <span class="lang-name">Français</span>
      <span class="lang-sub">Continuer en français</span>
    </button>
    <button class="lang-btn" onclick="chooseLang('en')">
      <span class="flag">🇬🇧</span>
      <span class="lang-name">English</span>
      <span class="lang-sub">Continue in English</span>
    </button>
  </div>
</div>

<!-- ===== LANDING PAGE ===== -->
<div id="landing" style="display:none;">
  <div class="landing-content">
    <img src="images/saimlogo.png" alt="Logo SAIM" class="landing-logo" />
    <h1 data-i18n="landing-title"></h1>
    <p  data-i18n="landing-sub"></p>
    <button id="btn-start">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <span data-i18n="btn-start"></span>
    </button>
  </div>
</div>

<!-- ===== COURSE PAGE ===== -->
<div id="course">

  <nav>
    <img src="images/saimlogo.png" alt="Logo SAIM" />
    <span class="nav-title" data-i18n="nav-title"></span>
    <span class="nav-badge" data-i18n="nav-badge"></span>
    <div class="lang-toggle">
      <button id="toggle-fr" onclick="switchLang('fr')">FR</button>
      <button id="toggle-en" onclick="switchLang('en')">EN</button>
    </div>
  </nav>

  <!-- QUI SOMMES-NOUS -->
  <section>
    <div class="container">
      <div class="saim-intro">
        <div class="saim-icon">🌍</div>
        <div>
          <h2 data-i18n="who-h2"></h2>
          <p data-i18n="who-p"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- OBJECTIFS -->
  <section>
    <div class="container">
      <span class="section-label" data-i18n="obj-label"></span>
      <h2 data-i18n="obj-h2"></h2>
      <p data-i18n="obj-intro"></p>
      <div class="objectives-grid">
        <div class="obj-card"><div class="obj-icon">🧠</div><p data-i18n="obj-1"></p></div>
        <div class="obj-card"><div class="obj-icon">🛠</div><p data-i18n="obj-2"></p></div>
        <div class="obj-card"><div class="obj-icon">✍</div><p data-i18n="obj-3"></p></div>
        <div class="obj-card"><div class="obj-icon">⚡</div><p data-i18n="obj-4"></p></div>
        <div class="obj-card"><div class="obj-icon">🚀</div><p data-i18n="obj-5"></p></div>
      </div>
    </div>
  </section>

  <!-- IMAGE ILLUSTRATIVE -->
  <section style="padding:1rem 0;">
    <div class="container">
      <img src="images/image_chatgpt.jpg" alt="Introduction à l'IA" class="illus-image" />
    </div>
  </section>

  <!-- PROGRAMME -->
  <section>
    <div class="container">
      <span class="section-label" data-i18n="prog-label"></span>
      <h2 data-i18n="prog-h2"></h2>
      <div class="modules-list">
        <div class="module-badge active"><div class="module-num">1</div><span data-i18n="mod1-badge"></span></div>
        <div class="module-badge"><div class="module-num">2</div><span data-i18n="mod2-badge"></span></div>
        <div class="module-badge"><div class="module-num">3</div><span data-i18n="mod3-badge"></span></div>
      </div>

  <!-- MODULE 1 -->

    <div class="container">

// ==================== ACTIVE LANG ====================
let currentLang = 'fr';

function applyLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  const dict = T[lang];

  // Update page title
  document.title = dict['page-title'];

  // Update all [data-i18n] elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });

  // Update toggle buttons state
  document.getElementById('toggle-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('toggle-en').classList.toggle('active', lang === 'en');
}

function chooseLang(lang) {
  applyLang(lang);
  const ls = document.getElementById('lang-select');
  const lp = document.getElementById('landing');
  ls.classList.add('hidden');
  setTimeout(() => {
    ls.style.display = 'none';
    lp.style.display = 'flex';
    requestAnimationFrame(() => lp.style.opacity = '1');
  }, 600);
}

function switchLang(lang) {
  applyLang(lang);
}

// ==================== LANDING -> COURSE ====================
document.getElementById('btn-start').addEventListener('click', () => {
  const landing = document.getElementById('landing');
  const course  = document.getElementById('course');
  landing.classList.add('hidden');
  setTimeout(() => {
    landing.style.display = 'none';
    course.style.display = 'block';
    requestAnimationFrame(() => course.classList.add('visible'));
    window.scrollTo({ top: 0 });
  }, 800);
});

// ==================== SCROLL ANIMATIONS ====================
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 80);
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.obj-card').forEach(c => observer.observe(c));

// ==================== POPUP ====================
const popup       = document.getElementById('popup-overlay');
const confettiBox = document.getElementById('confetti-container');
const COLORS = ['#F59E0B','#10B981','#0284C7','#EF4444','#8B5CF6','#EC4899','#F97316'];

function spawnConfetti() {
  confettiBox.innerHTML = '';
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const size  = 6 + Math.random() * 8;
    p.style.cssText = `left:${Math.random()*100}%;background:${color};width:${size}px;height:${size}px;border-radius:${Math.random()>.5?'50%':'2px'};transform:rotate(${Math.random()*360}deg);animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*1.2}s;`;
    confettiBox.appendChild(p);
  }
}

document.getElementById('btn-finish').addEventListener('click', () => {
  popup.classList.add('active');
  spawnConfetti();
});
document.getElementById('btn-close-popup').addEventListener('click', () => popup.classList.remove('active'));
popup.addEventListener('click', e => { if (e.target === popup) popup.classList.remove('active'); });

// Init landing hidden (shown only after lang selection)
document.getElementById('landing').style.opacity = '0';
document.getElementById('landing').style.transition = 'opacity 0.5s ease';
</script>
